<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Ultimate Ping</title>
    <style>
        body { 
            background: #000; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        #btn {
            padding: 30px 60px;
            font-size: 2rem;
            color: white;
            background: #ff0000;
            border: 5px solid white;
            cursor: pointer;
            z-index: 10;
        }

        /* Screen Shake Animation */
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-3px, -2px); }
            100% { transform: translate(1px, 1px); }
        }

        /* The Blinding Notification */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        h1 { color: black; font-size: 5rem; text-align: center; }
    </style>
</head>
<body id="body">

    <div id="overlay"><h1>🚨 PINGED! 🚨</h1></div>
    <button id="btn">SEND TO EVERYONE</button>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io('http://localhost:3000');
        const overlay = document.getElementById('overlay');
        const body = document.getElementById('body');

        // When YOU click the button
        document.getElementById('btn').onclick = () => {
            socket.emit('send-ping');
        };

        // When the SERVER sends the signal (To You & Others)
        socket.on('receive-ping', () => {
            // Trigger the visual chaos
            overlay.style.display = 'flex';
            body.classList.add('shake');

            // Turn it off after 800ms
            setTimeout(() => {
                overlay.style.display = 'none';
                body.classList.remove('shake');
            }, 800);
        });
    </script>
</body>
</html>
