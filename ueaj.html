<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mega Ping</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: white; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.2s;
        }

        /* The Flash Effect */
        body.alert-active { background: #ff0055; }

        #ping-btn {
            padding: 25px 50px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            border: none;
            border-radius: 15px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        #ping-btn:active { transform: scale(0.9); }

        .notif {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 40px;
            background: white;
            color: black;
            font-size: 3rem;
            border-radius: 20px;
            box-shadow: 0 0 100px #fff;
            z-index: 1000;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>

    <button id="ping-btn">TRIGGER GLOBAL ALERT</button>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io('http://localhost:3000');
        const btn = document.getElementById('ping-btn');
        const body = document.body;

        // Send signal to server
        btn.onclick = () => {
            socket.emit('send-ping');
        };

        // Listen for signal (from self or others)
        socket.on('receive-ping', () => {
            // Visual Alert 1: Bright Background Flash
            body.classList.add('alert-active');
            
            // Visual Alert 2: Pop-up Box
            const box = document.createElement('div');
            box.className = 'notif';
            box.innerText = '🚨 ALERT TRIGGERED! 🚨';
            document.body.appendChild(box);

            // Clean up after 1 second
            setTimeout(() => {
                body.classList.remove('alert-active');
                box.remove();
            }, 1000);
        });
    </script>
</body>
</html>
